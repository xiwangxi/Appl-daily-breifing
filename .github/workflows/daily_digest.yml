name: AAPL Daily Telegram Digest

# 注意：GitHub Actions 的 schedule 触发只会在仓库默认分支上运行，
# 这个 workflow 文件需要合并到默认分支后，定时任务才会真正生效。
#
# 慕尼黑当地时间 7:00 早上推送。欧洲和美国的夏令时切换日期不完全一致，
# 为了不用手动改 cron，这里在 UTC 5:00 和 6:00 各触发一次（工作日），
# main.py 里 RUN_MODE=scheduled 时会检查当前是否真的是 Europe/Berlin 7点，
# 不是的话直接跳过，所以不会重复推送。
on:
  schedule:
    - cron: "0 5 * * 1-5"
    - cron: "0 6 * * 1-5"
  workflow_dispatch: {}  # 允许在 Actions 页面手动触发，方便调试

permissions:
  contents: write

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily digest
        env:
          # 只有真正的 schedule 触发才检查"是不是本地7点"；手动 workflow_dispatch 直接跑，方便调试。
          RUN_MODE: ${{ github.event_name == 'schedule' && 'scheduled' || 'manual' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL }}
        run: python main.py

      - name: Persist dedup/IV history data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/seen_news.json data/iv_history.json 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: update digest state [skip ci]"
            git push
          else
            echo "No state changes to commit"
          fi
