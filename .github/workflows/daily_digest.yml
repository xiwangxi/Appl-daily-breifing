name: Daily Telegram Digests

# 注意：GitHub Actions 的 schedule 触发只会在仓库默认分支上运行，
# 这个 workflow 文件需要合并到默认分支后，定时任务才会真正生效。
#
# 这一个 workflow 里跑两个 digest：
#   - main_market.py：美股大盘宏观 Daily，慕尼黑本地时间 6:xx，中英双语，发给所有配置的 chat_id
#   - main.py：AAPL 个股 Daily，慕尼黑本地时间 7:xx，只发给主 chat_id
# 欧洲/美国的夏令时切换日期不完全一致，所以每个 digest 各设两个 UTC cron 入口覆盖夏令时/冬令时，
# 每个脚本自己用 Europe/Berlin 时区判断当前是不是自己的目标小时，不是就跳过。
# 两个 digest 的目标小时只差1小时，冬令时/夏令时切换时其中一个脚本的"备用"cron入口偶尔会落进
# 另一个 digest 的目标小时——这种情况靠 data/last_sent.json 的"今天发过了没"标记兜底去重，
# 不会导致重复推送，最多是大盘 Daily 偶尔早发一点。
#
# cron 故意不设在整点：GitHub 官方说明整点是全平台 schedule 触发扎堆的高峰期，
# 负载高时可能被延迟甚至直接跳过（不是排队，是这次触发就没了），错开几分钟能大幅降低概率。
on:
  schedule:
    - cron: "33 4 * * 1-5"  # 大盘 Daily，夏令时 (Europe/Berlin 6:33)
    - cron: "33 5 * * 1-5"  # 大盘 Daily，冬令时 (Europe/Berlin 6:33)
    - cron: "7 5 * * 1-5"   # AAPL Daily，夏令时 (Europe/Berlin 7:07)
    - cron: "7 6 * * 1-5"   # AAPL Daily，冬令时 (Europe/Berlin 7:07)
  workflow_dispatch: {}  # 允许在 Actions 页面手动触发，方便调试

permissions:
  contents: write

jobs:
  send-digests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run US Market Daily (macro, bilingual)
        env:
          # 只有真正的 schedule 触发才检查"是不是本地目标小时"；手动 workflow_dispatch 直接跑，方便调试。
          RUN_MODE: ${{ github.event_name == 'schedule' && 'scheduled' || 'manual' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHAT_ID_2: ${{ secrets.TELEGRAM_CHAT_ID_2 }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL }}
        run: python main_market.py

      - name: Run AAPL Daily
        env:
          RUN_MODE: ${{ github.event_name == 'schedule' && 'scheduled' || 'manual' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL }}
        run: python main.py

      - name: Persist dedup/state data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/seen_news.json data/seen_market_news.json data/iv_history.json data/last_sent.json 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: update digest state [skip ci]"
            git push
          else
            echo "No state changes to commit"
          fi
