name: Daily Telegram Digests

# 注意：GitHub Actions 自带的 schedule 定时触发在这个仓库上实测完全不可靠——上线后跨了
# 好几个工作日、多个正确配置的 cron 触发点，一次都没有自动跑起来过，只有手动/API 触发
# （workflow_dispatch）每次都成功。怀疑是 GitHub 对新账号/低活跃度仓库的 schedule 触发有
# 反滥用限制。所以放弃 schedule，改为用外部免费定时服务（比如 cron-job.org）在正确的本地
# 时间调用 GitHub API 的 workflow_dispatch 接口来触发，具体配置见 README「外部定时触发配置」。
#
# 两个 digest 分开触发：
#   digest=market -> 只跑 main_market.py（美股大盘宏观 Daily，中英双语）
#   digest=aapl   -> 只跑 main.py（AAPL 个股 Daily）
#   digest=both   -> 两个都跑（手动测试用，网页上点 "Run workflow" 默认这个）
# scheduled=true 表示这是外部定时服务的正式触发（会跳过周末、会做当天去重）；
# 手动在网页上点 "Run workflow" 时默认 scheduled=false，方便随时测试不受限制。
on:
  workflow_dispatch:
    inputs:
      digest:
        description: "跑哪个 digest"
        type: choice
        options: [both, market, aapl]
        default: both
      scheduled:
        description: "是否按正式定时任务处理（跳过周末+当天去重）；外部定时服务调用时传 true"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  send-digests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run US Market Daily (macro, bilingual)
        if: ${{ inputs.digest == 'both' || inputs.digest == 'market' }}
        env:
          RUN_MODE: ${{ inputs.scheduled && 'scheduled' || 'manual' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHAT_ID_2: ${{ secrets.TELEGRAM_CHAT_ID_2 }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL }}
        run: python main_market.py

      - name: Run AAPL Daily
        if: ${{ inputs.digest == 'both' || inputs.digest == 'aapl' }}
        env:
          RUN_MODE: ${{ inputs.scheduled && 'scheduled' || 'manual' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL }}
        run: python main.py

      - name: Persist dedup/state data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/seen_news.json data/seen_market_news.json data/iv_history.json data/last_sent.json 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: update digest state [skip ci]"
            git push
          else
            echo "No state changes to commit"
          fi
